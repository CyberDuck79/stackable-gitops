# kind cluster configuration for local Stackable development
# Exposes 3 worker nodes to handle the resource requirements of
# the full data platform stack.
#
# Usage: kind create cluster --name stackable --config bootstrap/kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Expose ArgoCD UI
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # Expose ArgoCD gRPC (argocd CLI)
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP

  - role: worker
  - role: worker
  - role: worker
