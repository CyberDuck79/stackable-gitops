# kind cluster configuration for local Stackable development
# Exposes 3 worker nodes to handle the resource requirements of
# the full data platform stack.
#
# Usage: kind create cluster --name stackable --config bootstrap/kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # ArgoCD UI
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # ArgoCD gRPC (argocd CLI)
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      # Airflow webserver — NodePort assigned by the Stackable listener operator.
      # Value observed from a running cluster; if it differs after recreation, update
      # this file and run: kind delete cluster --name stackable && kind create cluster ...
      - containerPort: 31873
        hostPort: 31873
        protocol: TCP
      # MinIO S3 API — pinned to 32000 in argocd/apps/minio.yaml
      - containerPort: 32000
        hostPort: 32000
        protocol: TCP
      # MinIO console — pinned to 32001 in argocd/apps/minio.yaml
      - containerPort: 32001
        hostPort: 32001
        protocol: TCP
      # Superset — NodePort assigned by the Stackable listener operator (see note above)
      - containerPort: 32645
        hostPort: 32645
        protocol: TCP
      # Trino coordinator HTTPS — NodePort assigned by the Stackable listener operator (see note above)
      - containerPort: 30437
        hostPort: 30437
        protocol: TCP

  - role: worker
  - role: worker
  - role: worker
