---
# AirflowCluster — deploys Apache Airflow with Celery executors.
# Dependencies: airflow-postgresql, airflow-redis (both in data-platform ns).
apiVersion: airflow.stackable.tech/v1alpha1
kind: AirflowCluster
metadata:
  name: airflow
  namespace: data-platform
spec:
  image:
    productVersion: "3.1.6"
    pullPolicy: IfNotPresent
  clusterConfig:
    loadExamples: false
    exposeConfig: false
    credentialsSecret: airflow-credentials
    dagsGitSync:
      - repo: https://github.com/CyberDuck79/stackable-gitops
        branch: main
        gitFolder: dags
        depth: 1
        wait: 20s
  webservers:
    roleConfig:
      listenerClass: external-unstable
    roleGroups:
      default:
        replicas: 1
        envOverrides:
          AIRFLOW__LOGGING__REMOTE_LOGGING: "True"
          AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "s3://airflow-logs/task-logs"
          AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: "minio_default"
        config:
          resources:
            cpu:
              min: "200m"
              max: "1000m"
            memory:
              limit: "1Gi"
        podOverrides:
          spec:
            containers:
              - name: airflow
                envFrom:
                  - secretRef:
                      name: airflow-connections
  celeryExecutors:
    roleGroups:
      default:
        replicas: 1
        envOverrides:
          AIRFLOW__CELERY__WORKER_CONCURRENCY: "4"
          AIRFLOW__LOGGING__REMOTE_LOGGING: "True"
          AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "s3://airflow-logs/task-logs"
          AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: "minio_default"
        config:
          resources:
            cpu:
              min: "200m"
              max: "1000m"
            memory:
              limit: "2Gi"
        podOverrides:
          spec:
            containers:
              - name: airflow
                envFrom:
                  - secretRef:
                      name: airflow-connections
  schedulers:
    roleGroups:
      default:
        replicas: 1
        envOverrides:
          AIRFLOW__LOGGING__REMOTE_LOGGING: "True"
          AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "s3://airflow-logs/task-logs"
          AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: "minio_default"
        config:
          resources:
            cpu:
              min: "200m"
              max: "500m"
            memory:
              limit: "512Mi"
        podOverrides:
          spec:
            containers:
              - name: airflow
                envFrom:
                  - secretRef:
                      name: airflow-connections
  dagProcessors:
    roleGroups:
      default:
        replicas: 1
        config:
          resources:
            cpu:
              min: "100m"
              max: "500m"
            memory:
              limit: "512Mi"
