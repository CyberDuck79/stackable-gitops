---
# SealedSecret — all Airflow credentials in one secret.
#
# Fields required by the AirflowCluster credentialsSecret:
#   adminUser.*            — Airflow web UI admin account
#   connections.sqlalchemyDatabaseUri — metadata DB connection string
#   connections.celeryResultBackend   — result backend (same DB)
#   connections.celeryBrokerUrl       — Redis queue URL
#
# ⚠ The encryptedData values below are PLACEHOLDERS.
#   Generate real values with: make seal-secrets
#
#   or manually:
#     kubeseal --cert tls.crt \
#       --namespace data-platform \
#       --scope namespace-wide \
#       -f secrets-templates/airflow-credentials.yaml \
#       -o yaml > platform/airflow/credentials-sealed-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: airflow-credentials
  namespace: data-platform
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  template:
    metadata:
      name: airflow-credentials
      namespace: data-platform
    type: Opaque
  encryptedData:
    adminUser.username: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
    adminUser.firstname: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
    adminUser.lastname: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
    adminUser.email: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
    adminUser.password: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
    connections.sqlalchemyDatabaseUri: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
    connections.celeryResultBackend: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
    connections.celeryBrokerUrl: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
