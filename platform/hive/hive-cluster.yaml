---
# HiveCluster — deploys the Apache Hive Metastore backed by PostgreSQL and MinIO.
#
# Note: Hive 4.x has known compatibility issues with Trino and Iceberg.
# Using 4.0.1 (LTS). If you hit issues, fall back to productVersion: 3.1.3.
# See: https://docs.stackable.tech/home/stable/hive/#hive-4-issues
apiVersion: hive.stackable.tech/v1alpha1
kind: HiveCluster
metadata:
  name: hive
  namespace: data-platform
spec:
  image:
    productVersion: "4.0.1"
  clusterConfig:
    database:
      connString: jdbc:postgresql://hive-postgresql.data-platform.svc.cluster.local:5432/hive
      credentialsSecret: hive-db-credentials
      dbType: postgres
    s3:
      reference: minio
  metastore:
    roleGroups:
      default:
        replicas: 1
        config:
          resources:
            cpu:
              min: "100m"
              max: "500m"
            memory:
              limit: "512Mi"
