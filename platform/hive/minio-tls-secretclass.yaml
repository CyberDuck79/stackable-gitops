---
# SecretClass used by the Stackable Secret Operator to discover the MinIO CA cert.
# It performs a label-based search in the pod's namespace for a Secret labeled:
#   secrets.stackable.tech/class: minio-tls-ca
#
# The CA cert Secret is created imperatively by scripts/setup-minio-tls.sh
# because it is generated locally and not stored in git.
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: minio-tls-ca
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}
