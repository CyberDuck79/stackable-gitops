---
# SecretClass — instructs the Stackable Secret Operator to search the pod's
# namespace for a Secret labelled with 'hive-s3-secret-class'.
# The matching Secret is provided by the SealedSecret 'hive-minio-credentials'.
apiVersion: secrets.stackable.tech/v1alpha1
kind: SecretClass
metadata:
  name: hive-s3-secret-class
spec:
  backend:
    k8sSearch:
      searchNamespace:
        pod: {}
