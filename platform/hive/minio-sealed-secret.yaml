---
# SealedSecret — MinIO access credentials consumed by the Hive S3Connection.
#
# The label 'secrets.stackable.tech/class: hive-s3-secret-class' is required
# so the Stackable Secret Operator can discover this secret.
#
# ⚠ The encryptedData values below are PLACEHOLDERS.
#   Generate real values with:
#
#     make seal-secrets
#
#   or manually:
#
#     kubeseal --cert tls.crt \
#       --namespace data-platform \
#       --scope namespace-wide \
#       -f secrets-templates/hive-minio-credentials.yaml \
#       -o yaml > platform/hive/minio-sealed-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hive-minio-credentials
  namespace: data-platform
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  template:
    metadata:
      name: hive-minio-credentials
      namespace: data-platform
      labels:
        secrets.stackable.tech/class: hive-s3-secret-class
    type: Opaque
  encryptedData:
    accessKey: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
    secretKey: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
