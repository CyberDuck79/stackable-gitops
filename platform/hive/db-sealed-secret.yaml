---
# SealedSecret — PostgreSQL credentials for the Hive metastore database.
#
# ⚠ The encryptedData values below are PLACEHOLDERS.
#   Generate real values with: make seal-secrets
#
#   or manually:
#     kubeseal --cert tls.crt \
#       --namespace data-platform \
#       --scope namespace-wide \
#       -f secrets-templates/hive-db-credentials.yaml \
#       -o yaml > platform/hive/db-sealed-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hive-db-credentials
  namespace: data-platform
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
spec:
  template:
    metadata:
      name: hive-db-credentials
      namespace: data-platform
    type: Opaque
  encryptedData:
    username: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
    password: REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE
