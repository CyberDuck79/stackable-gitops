---
# Hive Metastore stacklet — Hive cluster + S3Connection + SecretClass.
# Wave -1: deployed after infrastructure (MinIO + PostgreSQL) is ready.
# Trino depends on Hive, so Hive must be in an earlier wave than Trino (0).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hive
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: data-platform

  source:
    # ⚠ Replace with your actual fork/clone URL
    repoURL: https://github.com/CyberDuck79/stackable-gitops.git
    targetRevision: HEAD
    path: platform/hive

  destination:
    server: https://kubernetes.default.svc
    namespace: data-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
