---
# Stackable Secret Operator — manages TLS certificates and secret injection.
# Wave -4: must be ready before product operators (wave -3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stackable-secret-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: data-platform

  source:
    repoURL: oci://oci.stackable.tech/sdp-charts
    chart: secret-operator
    targetRevision: 26.3.0

  destination:
    server: https://kubernetes.default.svc
    namespace: stackable-operators

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
